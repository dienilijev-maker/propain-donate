<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фонд за Propain</title>
<style>
body{
    font-family:Arial,sans-serif;
    text-align:center;
    background:#f5f5f5;
    padding:50px;
}
.box{
    max-width:500px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}
button{
    background:#28a745;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
    <h1>🚲 Фонд за нов Propain велосипед</h1>
    <p>Цел: 4.999 €</p>
    <p>Собрани: 0.00 €</p>

    <button onclick="prank()">Донирај</button>
</div>

<script>
function prank(){
    alert("😂 Те фатив! Ова е само шега. Нема вистински донации.");
}
</script>

</body>
</html>
